<body>
  <div class="page">

    <header class="topbar">
      <div class="left">
        <div class="brand">Momentum</div>
        <a href="./course.html" class="back">Back to course</a>
      </div>

      <div class="right">
        <span id="moduleNumber">1 of 20</span>
      </div>
    </header>

    <main class="content">

      <div class="module-head">
        <h1 id="moduleTitle">Module 1: Training Reflection</h1>
        <p class="course" id="moduleCourseName">Sports Training Performance</p>
      </div>

      <section class="prompt-block">
        <p id="modulePrompt">
          Describe one training session from this week and explain what you were working on, what challenges you faced, and what you learned.
        </p>
      </section>

      <section class="response-block">
        <label for="moduleResponse">Your response</label>

        <textarea
          id="moduleResponse"
          placeholder="Write clearly and specifically..."
        ></textarea>

        <div class="response-footer">
          <span id="wordCount">0 words</span>
        </div>
      </section>

      <div class="actions">
        <button id="saveModuleBtn" class="btn secondary">Save</button>
        <button id="nextModuleBtn" class="btn primary">Next</button>
      </div>

    </main>
  </div>

  <script type="module" src="./full-courses-data.js"></script>
  <script type="module" src="./module.js"></script>
</body>
