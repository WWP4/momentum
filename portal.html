<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Portal</title>
  <link rel="stylesheet" href="portal.css" />
</head>
<body>

  <main id="portal">

    <section class="portalHero">
      <div class="logos">
        <div id="clubLogoWrap" hidden>
          <img id="clubLogo" />
        </div>
        <div class="divider">×</div>
        <div class="momentum">Momentum</div>
      </div>

      <p id="sport"></p>
      <h1 id="headline"></h1>
      <p id="copy"></p>
      <p id="contact"></p>
    </section>

    <section class="courses">
      <h2>Available Courses</h2>
      <div id="coursesGrid"></div>
    </section>

  </main>

  <script type="module" src="portal.js"></script>
</body>
</html>
